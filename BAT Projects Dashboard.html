<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BAT Projects Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;}
  body{margin:0;background:#f6f8fb;}
  @keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  input:focus,select:focus,button:focus{outline:2px solid #4778a8;outline-offset:1px}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-thumb{background:#c4cdd6;border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const e = React.createElement;

class BATDashboard extends React.Component {
  constructor(props) {
    super(props);
    this.state = {
      filterType:'All', filterOwner:'All', expandedProject:null,
      showManage:false, manageTab:'hours',
      entryMember:'Sweta', selectedWeek:'w7',
      weeklyLog:{}, members:null, projects:null,
      hourEntries:{},
      chartView:'weekly',
      newProject:{name:'',owner:'Sweta',type:'Transform',status:'Implementation'},
      newMember:{name:'',capacity:40},
    };
  }

  NAVY='#1b2d44'; BLUE='#4778a8'; GREEN='#2ea86a'; AMBER='#d98f28'; RED='#c73a3a'; GRAY='#9aaabb';
  TC={Transform:'#4778a8',Grow:'#2ea86a',Run:'#d98f28',Agent:'#7055c0'};
  SS={Completed:{dot:'#2ea86a',color:'#2ea86a'},Implementation:{dot:'#4778a8',color:'#4778a8'},Support:{dot:'#4778a8',color:'#4778a8'},Assessment:{dot:'#9aaabb',color:'#9aaabb'},'On Hold':{dot:'#d98f28',color:'#d98f28'}};

  // WEEKS: actualIdx = index into actual8w, planIdx = index into planned4w (null if not available)
  WEEKS=[
    {key:'w7',label:'Jun 22–26 (current ▶)',shortLabel:'Jun 22',actualIdx:7,planIdx:3},
    {key:'w6',label:'Jun 15–19',shortLabel:'Jun 15',actualIdx:6,planIdx:2},
    {key:'w5',label:'Jun 8–12',shortLabel:'Jun 8',actualIdx:5,planIdx:1},
    {key:'w4',label:'Jun 1–5',shortLabel:'Jun 1',actualIdx:4,planIdx:0},
    {key:'w3',label:'May 25–29',shortLabel:'May 25',actualIdx:3,planIdx:null},
    {key:'w2',label:'May 18–22',shortLabel:'May 18',actualIdx:2,planIdx:null},
    {key:'w1',label:'May 11–15',shortLabel:'May 11',actualIdx:1,planIdx:null},
    {key:'w0',label:'May 4–8',shortLabel:'May 4',actualIdx:0,planIdx:null},
  ];

  DEFAULT_MEMBERS=['Sweta','Jonny','Anil','Saurabh','Vinay'];
  DEFAULT_PROJECTS=[
    {name:'Aisera PMI Project',owner:'Sweta',type:'Transform',status:'Completed',actual8w:[0,0,0,0,0,0,0,0],planned4w:[0,0,0,0],forecast:[0,0,0]},
    {name:'AP Advance Matching',owner:'Jonny',type:'Transform',status:'Implementation',actual8w:[2,0,2,0,2,4,4,3],planned4w:[4,4,5.2,6],forecast:[3.6,2,2]},
    {name:'Bank Integrations',owner:'Anil',type:'Transform',status:'Implementation',actual8w:[0,0,0,0,0,4,4,0],planned4w:[4,4,4,4],forecast:[4,4,4]},
    {name:'India Functions',owner:'Saurabh',type:'Run',status:'Implementation',actual8w:[0,3,3,2,0,3,3,0],planned4w:[3,3,3,3],forecast:[1.2,0,0]},
    {name:'Fixed Assets / Inventory',owner:'Saurabh',type:'Transform',status:'Implementation',actual8w:[0,2,2,2,2,10,12,0],planned4w:[10,10,10,10],forecast:[8.8,8,8]},
    {name:'Concur Integration',owner:'Anil',type:'Grow',status:'Support',actual8w:[2,2,2,2,2,2,2,2],planned4w:[2,2,2,2],forecast:[0.8,0,0]},
    {name:'Dunning Letters',owner:'Saurabh',type:'Transform',status:'Implementation',actual8w:[0,2,2,2,2,1,2,0],planned4w:[1,1,0.8,1],forecast:[0.2,0,0]},
    {name:'Blackline Re-Implementation',owner:'Sweta',type:'Grow',status:'Implementation',actual8w:[10,10,12.5,10,10,10,10,5],planned4w:[10,10,10,10],forecast:[7,5,5]},
    {name:'Workday HRMS RFP',owner:'Vinay',type:'Grow',status:'Assessment',actual8w:[0,0,0,0,0,0,0,0],planned4w:[0,0,0,0],forecast:[0,0,0]},
    {name:'Columbia ERP Implementation',owner:'Jonny',type:'Transform',status:'Implementation',actual8w:[0,0,2,0,1,0,1,1],planned4w:[2,2,2,2],forecast:[2,2,2]},
    {name:'Recon Agent',owner:'Sweta',type:'Agent',status:'Implementation',actual8w:[1,1,1,1,1,1,2,0],planned4w:[1,1,1,1],forecast:[1,1,1]},
    {name:'ASF P2P Solution',owner:'Saurabh',type:'Agent',status:'Implementation',actual8w:[1,1,1,1,1,1,3,0],planned4w:[1,1,1,0],forecast:[0.6,1,1]},
    {name:'AP PO UK (A360)',owner:'Saurabh',type:'Agent',status:'Implementation',actual8w:[1,1,0,0,0,0,1,0],planned4w:[0,0,0,0],forecast:[0,0,0]},
    {name:'Cash Auto Application',owner:'Jonny',type:'Agent',status:'Implementation',actual8w:[5,0,0,0,2,2,2,2],planned4w:[2,2,2,2],forecast:[2,2,2]},
    {name:'Payment Buddy',owner:'Jonny',type:'Agent',status:'Implementation',actual8w:[4,0,4,0,4,4,2,2],planned4w:[2,2,6,7],forecast:[7,7,5.8]},
    {name:'Adopt Use Cases',owner:'Saurabh',type:'Agent',status:'Implementation',actual8w:[0,5,5,5,5,5,1,0],planned4w:[5,5,5,5],forecast:[2.6,1,1]},
    {name:'Transform Flux Reports 2.0',owner:'Jonny',type:'Transform',status:'On Hold',actual8w:[5,0,8,0,0,0,0,0],planned4w:[0,0,0,0],forecast:[0,0,0]},
    {name:'FPNA - Process & Agent',owner:'Sweta',type:'Transform',status:'Assessment',actual8w:[0,0,0,0,0,0,3,0],planned4w:[0,0,0,0],forecast:[0,0,0]},
    {name:'SAP - Columbia Impl.',owner:'Sweta',type:'Run',status:'Assessment',actual8w:[0,0,0,0,0,3,1,0],planned4w:[0,0,0,0],forecast:[0,0,0]},
    {name:'Workday Data Scramble',owner:'Anil',type:'Transform',status:'Assessment',actual8w:[0,0,0,0,0,0,3,3],planned4w:[3,3,3,0],forecast:[0,0,0]},
    {name:'Cash Auto App (Anil)',owner:'Anil',type:'Agent',status:'Implementation',actual8w:[0,0,0,0,6,4,8,4],planned4w:[0,3,3,3],forecast:[3,3,3]},
  ];
  OWNER_TOTALS={
    Sweta:{planned:[36,36,36,36],actual:[36,40,41,0]},
    Jonny:{planned:[33,33,38.2,40],actual:[28,31,29,0]},
    Anil:{planned:[40,40,40,40],actual:[40,43,43,0]},
    Saurabh:{planned:[38,38,37.8,37],actual:[38,30,0,0]},
    Vinay:{planned:[4,4,4,4],actual:[0,0,0,0]},
  };

  componentDidMount(){
    try{
      const d=JSON.parse(localStorage.getItem('bat_v1')||'{}');
      const p={};
      if(d.weeklyLog){
        // migrate old flat format {name:{planned,actual}} → {name:{w7:{planned,actual}}}
        const migrated={};
        Object.entries(d.weeklyLog).forEach(([name,v])=>{
          if(v&&typeof v==='object'&&!this.WEEKS.some(w=>v[w.key]!==undefined)){
            migrated[name]={w7:v};
          } else {
            migrated[name]=v;
          }
        });
        p.weeklyLog=migrated;
      }
      if(d.members)p.members=d.members;
      if(d.projects)p.projects=d.projects;
      if(Object.keys(p).length)this.setState(p);
    }catch(e){}
  }

  persist(patch){
    const n={...this.state,...patch};
    try{localStorage.setItem('bat_v1',JSON.stringify({weeklyLog:n.weeklyLog,members:n.members,projects:n.projects}));}catch(e){}
    this.setState(patch);
  }

  getMembers(){return this.state.members||this.DEFAULT_MEMBERS;}

  getProjects(){
    const base=this.state.projects||this.DEFAULT_PROJECTS;
    const{weeklyLog}=this.state;
    return base.map(p=>{
      const plog=weeklyLog[p.name];
      if(!plog)return p;
      const newActual=[...p.actual8w];
      const newPlanned=[...p.planned4w];
      this.WEEKS.forEach(w=>{
        const entry=plog[w.key];
        if(!entry)return;
        if(w.actualIdx!==null&&entry.actual!==''&&entry.actual!=null)newActual[w.actualIdx]=Number(entry.actual);
        if(w.planIdx!==null&&entry.planned!==''&&entry.planned!=null)newPlanned[w.planIdx]=Number(entry.planned);
      });
      return{...p,actual8w:newActual,planned4w:newPlanned};
    });
  }

  filtered(){
    const{filterType,filterOwner}=this.state;
    let ps=this.getProjects();
    if(filterType!=='All')ps=ps.filter(p=>p.type===filterType);
    if(filterOwner!=='All')ps=ps.filter(p=>p.owner===filterOwner);
    return ps;
  }

  vc(v){if(v===null||v===undefined)return this.GRAY;return v>=0?this.GREEN:Math.abs(v)<=2?this.AMBER:this.RED;}

  loadWeekEntries(weekKey,memberName){
    const member=memberName||this.state.entryMember;
    const wk=this.WEEKS.find(w=>w.key===weekKey)||this.WEEKS[0];
    const ps=this.getProjects().filter(p=>p.owner===member&&p.status!=='Completed'&&p.status!=='On Hold');
    const entries={};
    ps.forEach(p=>{
      const plog=this.state.weeklyLog[p.name];
      const we=plog&&plog[weekKey];
      const rawPlanned=we?.planned??( wk.planIdx!==null ? p.planned4w[wk.planIdx] : '');
      const rawActual=we?.actual??(wk.actualIdx!==null ? p.actual8w[wk.actualIdx] : '');
      entries[p.name]={
        planned:rawPlanned===0?'':rawPlanned,
        actual:rawActual===0?'':rawActual,
      };
    });
    return entries;
  }

  // ── Manage button ──────────────────────────────────────────────
  buildManageBtn(){
    return e('button',{
      onClick:()=>{
        const entries=this.loadWeekEntries(this.state.selectedWeek,this.state.entryMember);
        this.setState({showManage:true,manageTab:'hours',hourEntries:entries});
      },
      style:{padding:'7px 16px',borderRadius:7,border:'1px solid rgba(255,255,255,0.2)',background:'rgba(255,255,255,0.1)',color:'rgba(255,255,255,0.9)',fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}
    },'Manage');
  }

  // ── Manage panel ───────────────────────────────────────────────
  buildManagePanel(){
    if(!this.state.showManage)return null;
    const{manageTab}=this.state;
    const tabs=[['hours','Log Hours'],['projects','Projects'],['team','Team']];
    const content=manageTab==='hours'?this.buildHoursTab():manageTab==='projects'?this.buildProjectsTab():this.buildTeamTab();
    return e('div',{style:{position:'fixed',inset:0,background:'rgba(10,20,35,0.72)',zIndex:1000,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'32px 16px',overflowY:'auto',animation:'fadeIn 0.15s ease-out'}},
      e('div',{style:{background:'#fff',borderRadius:12,width:'100%',maxWidth:680,maxHeight:'90vh',display:'flex',flexDirection:'column',boxShadow:'0 24px 64px rgba(0,0,0,0.3)'}},
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'18px 24px',borderBottom:'1px solid #e4e9ef',flexShrink:0}},
          e('span',{style:{fontSize:15,fontWeight:600,color:this.NAVY}},'Manage'),
          e('button',{onClick:()=>this.setState({showManage:false}),style:{width:28,height:28,border:'1px solid #e4e9ef',borderRadius:6,background:'#f6f8fb',cursor:'pointer',fontSize:16,color:'#6b7d94',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'inherit'}},'×')
        ),
        e('div',{style:{display:'flex',borderBottom:'1px solid #e4e9ef',padding:'0 24px',flexShrink:0}},
          ...tabs.map(([id,label])=>e('button',{key:id,onClick:()=>this.setState({manageTab:id}),style:{padding:'11px 16px',border:'none',borderBottom:`2px solid ${manageTab===id?this.BLUE:'transparent'}`,background:'transparent',color:manageTab===id?this.BLUE:'#6b7d94',fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit',marginBottom:-1}},label))
        ),
        e('div',{style:{flex:1,overflowY:'auto',padding:'24px'}},content)
      )
    );
  }

  // ── Hours tab (with week selector) ────────────────────────────
  buildHoursTab(){
    const{entryMember,hourEntries,selectedWeek}=this.state;
    const members=this.getMembers();
    const wk=this.WEEKS.find(w=>w.key===selectedWeek)||this.WEEKS[0];
    const showPlanned=wk.planIdx!==null;
    const iS={width:72,padding:'6px 10px',border:'1px solid #dde4eb',borderRadius:7,fontSize:13,textAlign:'right',fontFamily:'inherit',background:'#fff',color:this.NAVY};
    const ps=this.getProjects().filter(p=>p.owner===entryMember&&p.status!=='Completed'&&p.status!=='On Hold');

    return e('div',null,
      // member picker
      e('div',{style:{marginBottom:14}},
        e('div',{style:{fontSize:11,color:this.GRAY,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8}},'Team member'),
        e('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
          ...members.map(m=>e('button',{key:m,onClick:()=>{
            const ent=this.loadWeekEntries(selectedWeek,m);
            this.setState({entryMember:m,hourEntries:ent});
          },style:{padding:'5px 14px',borderRadius:9999,fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit',border:`1.5px solid ${entryMember===m?this.BLUE:'#dde4eb'}`,background:entryMember===m?this.BLUE:'#fff',color:entryMember===m?'#fff':'#6b7d94'}},m))
        )
      ),

      // week picker
      e('div',{style:{marginBottom:16}},
        e('div',{style:{fontSize:11,color:this.GRAY,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8}},'Week'),
        e('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
          ...this.WEEKS.map(w=>e('button',{key:w.key,onClick:()=>{
            const ent=this.loadWeekEntries(w.key,entryMember);
            this.setState({selectedWeek:w.key,hourEntries:ent});
          },style:{
            padding:'5px 12px',borderRadius:9999,fontSize:12,fontWeight:500,cursor:'pointer',fontFamily:'inherit',
            border:`1.5px solid ${selectedWeek===w.key?this.NAVY:'#dde4eb'}`,
            background:selectedWeek===w.key?this.NAVY:'#fff',
            color:selectedWeek===w.key?'#fff':'#6b7d94',
            whiteSpace:'nowrap',
          }},w.shortLabel))
        )
      ),

      e('div',{style:{background:'#f6f8fb',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:12,color:this.GRAY}},
        `Week of ${wk.label} · ${showPlanned?'Edit planned + actual':'Actual hours only (planned not tracked for this week)'}`
      ),

      e('table',{style:{width:'100%',borderCollapse:'collapse'}},
        e('thead',null,e('tr',{style:{borderBottom:'2px solid #e4e9ef'}},
          ...['Project', showPlanned?'Planned (h)':null,'Actual (h)'].filter(Boolean).map(h=>e('th',{key:h,style:{padding:'8px 0',fontSize:10,color:this.GRAY,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',textAlign:h==='Project'?'left':'right'}},h))
        )),
        e('tbody',null,...(ps.length?ps.map(p=>{
          const ent=hourEntries[p.name]||{planned:'',actual:''};
          const upd=(field,val)=>this.setState(s=>({hourEntries:{...s.hourEntries,[p.name]:{...s.hourEntries[p.name]||{},[field]:val}}}));
          return e('tr',{key:p.name,style:{borderBottom:'1px solid #f0f4f8'}},
            e('td',{style:{padding:'10px 0',fontSize:13,color:this.NAVY}},
              e('div',{style:{display:'flex',alignItems:'center',gap:8}},
                e('div',{style:{width:3,height:16,borderRadius:2,background:this.TC[p.type],flexShrink:0}}),p.name)
            ),
            showPlanned&&e('td',{style:{padding:'10px 8px',textAlign:'right'}},
              e('input',{type:'number',value:ent.planned??'',min:0,step:0.5,onChange:ev=>upd('planned',ev.target.value===''?'':parseFloat(ev.target.value)||0),style:iS})
            ),
            e('td',{style:{padding:'10px 0',textAlign:'right'}},
              e('input',{type:'number',value:ent.actual??'',min:0,step:0.5,placeholder:'—',onChange:ev=>upd('actual',ev.target.value===''?'':parseFloat(ev.target.value)||0),style:{...iS,borderColor:this.BLUE,background:'#f4f8ff'}})
            )
          );
        }):[e('tr',{key:'empty'},e('td',{colSpan:3,style:{padding:'24px 0',textAlign:'center',color:this.GRAY,fontSize:14}},'No active projects for this member'))]))
      ),

      e('div',{style:{marginTop:20,display:'flex',justifyContent:'flex-end',gap:10}},
        e('button',{onClick:()=>this.setState({showManage:false}),style:{padding:'8px 16px',border:'1px solid #dde4eb',borderRadius:8,background:'#fff',fontSize:13,cursor:'pointer',color:'#6b7d94',fontFamily:'inherit'}},'Cancel'),
        e('button',{onClick:()=>{
          const newLog={...this.state.weeklyLog};
          Object.entries(this.state.hourEntries).forEach(([name,v])=>{
            if(v.planned!==''||v.actual!==''){
              if(!newLog[name])newLog[name]={};
              newLog[name][selectedWeek]={
                planned:v.planned!==''?Number(v.planned):null,
                actual:v.actual!==''?Number(v.actual):null,
              };
            }
          });
          this.persist({weeklyLog:newLog,showManage:false});
        },style:{padding:'8px 20px',border:'none',borderRadius:8,background:this.BLUE,color:'#fff',fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}},'Save & update dashboard')
      )
    );
  }

  // ── Projects tab ───────────────────────────────────────────────
  buildProjectsTab(){
    const{newProject}=this.state;
    const members=this.getMembers(),projects=this.getProjects();
    const iS={padding:'8px 12px',border:'1px solid #dde4eb',borderRadius:8,fontSize:13,fontFamily:'inherit',color:this.NAVY,background:'#fff',width:'100%'};
    const setNP=patch=>this.setState({newProject:{...newProject,...patch}});
    return e('div',null,
      e('div',{style:{background:'#f6f8fb',borderRadius:10,padding:'16px',marginBottom:20}},
        e('div',{style:{fontSize:12,color:this.GRAY,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:12}},'Add new project'),
        e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}},
          e('input',{type:'text',placeholder:'Project name',value:newProject.name,onChange:ev=>setNP({name:ev.target.value}),style:{...iS,gridColumn:'1/-1'}}),
          e('select',{value:newProject.owner,onChange:ev=>setNP({owner:ev.target.value}),style:iS},...members.map(m=>e('option',{key:m,value:m},m))),
          e('select',{value:newProject.type,onChange:ev=>setNP({type:ev.target.value}),style:iS},...['Transform','Grow','Run','Agent'].map(t=>e('option',{key:t,value:t},t))),
          e('select',{value:newProject.status,onChange:ev=>setNP({status:ev.target.value}),style:iS},...['Implementation','Assessment','Support','On Hold','Completed'].map(s=>e('option',{key:s,value:s},s)))
        ),
        e('button',{onClick:()=>{
          if(!newProject.name.trim())return;
          const np={name:newProject.name.trim(),owner:newProject.owner,type:newProject.type,status:newProject.status,actual8w:[0,0,0,0,0,0,0,0],planned4w:[0,0,0,0],forecast:[0,0,0]};
          this.persist({projects:[...this.getProjects(),np],newProject:{name:'',owner:'Sweta',type:'Transform',status:'Implementation'}});
        },style:{padding:'8px 18px',border:'none',borderRadius:8,background:this.BLUE,color:'#fff',fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}},'+ Add project')
      ),
      e('table',{style:{width:'100%',borderCollapse:'collapse'}},
        e('thead',null,e('tr',{style:{borderBottom:'2px solid #e4e9ef'}},
          ...['Project','Owner','Type',''].map(h=>e('th',{key:h,style:{padding:'8px 0',fontSize:10,color:this.GRAY,fontWeight:600,letterSpacing:'0.07em',textTransform:'uppercase',textAlign:h===''?'right':'left'}},h))
        )),
        e('tbody',null,...projects.map(p=>e('tr',{key:p.name,style:{borderBottom:'1px solid #f0f4f8'}},
          e('td',{style:{padding:'11px 0',fontSize:13,color:this.NAVY}},e('div',{style:{display:'flex',alignItems:'center',gap:6}},e('div',{style:{width:3,height:16,borderRadius:2,background:this.TC[p.type],flexShrink:0}}),p.name)),
          e('td',{style:{padding:'11px 8px',fontSize:12,color:this.GRAY}},p.owner),
          e('td',{style:{padding:'11px 8px'}},e('span',{style:{fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:4,color:this.TC[p.type],background:`${this.TC[p.type]}18`}},p.type)),
          e('td',{style:{padding:'11px 0',textAlign:'right'}},
            e('button',{onClick:()=>this.persist({projects:this.getProjects().filter(x=>x.name!==p.name)}),style:{padding:'4px 10px',border:'1px solid #e4e9ef',borderRadius:6,background:'#fff',color:this.GRAY,fontSize:12,cursor:'pointer',fontFamily:'inherit'}},'Remove')
          )
        )))
      )
    );
  }

  // ── Team tab ───────────────────────────────────────────────────
  buildTeamTab(){
    const{newMember}=this.state,members=this.getMembers();
    const iS={padding:'8px 12px',border:'1px solid #dde4eb',borderRadius:8,fontSize:13,fontFamily:'inherit',color:this.NAVY,background:'#fff'};
    return e('div',null,
      e('div',{style:{background:'#f6f8fb',borderRadius:10,padding:'16px',marginBottom:20}},
        e('div',{style:{fontSize:12,color:this.GRAY,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:12}},'Add team member'),
        e('div',{style:{display:'flex',gap:10,marginBottom:12,flexWrap:'wrap'}},
          e('input',{type:'text',placeholder:'Full name',value:newMember.name,onChange:ev=>this.setState({newMember:{...newMember,name:ev.target.value}}),style:{...iS,flex:'1 1 160px'}}),
          e('input',{type:'number',placeholder:'Capacity h/wk',value:newMember.capacity,min:1,max:80,onChange:ev=>this.setState({newMember:{...newMember,capacity:parseInt(ev.target.value)||40}}),style:{...iS,width:150}})
        ),
        e('button',{onClick:()=>{

            e('span',{style:{color:'rgba(255,255,255,0.85)',fontSize:13,fontWeight:500}},'BAT Projects')
          ),
          e('div',{style:{display:'flex',alignItems:'center',gap:12}},
            e('span',{style:{color:'rgba(255,255,255,0.3)',fontSize:12,fontWeight:300}},'Jun 22, 2026'),
            this.buildManageBtn()
          )
        )
      ),

      this.buildManagePanel(),

      e('div',{style:{background:'#1b2d44',padding:'clamp(40px,6vw,80px) clamp(20px,5vw,64px) clamp(52px,8vw,100px)'}},
        e('div',{style:{maxWidth:1120,margin:'0 auto'}},
          e('div',{style:{fontSize:11,color:'#4778a8',letterSpacing:'0.14em',textTransform:'uppercase',fontWeight:600,marginBottom:16}},'Business Applications Team · Portfolio Review'),
          e('h1',{style:{fontSize:'clamp(30px,5vw,58px)',fontWeight:300,color:'#fff',lineHeight:1.1,margin:'0 0 16px',letterSpacing:'-0.025em',maxWidth:600}},
            'What the team',e('br',null),'is building.'
          ),
          e('p',{style:{fontSize:'clamp(13px,1.8vw,16px)',color:'rgba(255,255,255,0.4)',maxWidth:480,lineHeight:1.75,fontWeight:300,margin:0}},
            'Planned hours, actual delivery, and variance across all projects. Click ',
            e('strong',{style:{color:'rgba(255,255,255,0.6)',fontWeight:500}},'Manage'),
            ' to log hours, add projects, or update the team.'
          )
        )
      ),

      e('div',{style:{background:'#fff',borderBottom:'1px solid #e4e9ef'}},
        e('div',{style:{maxWidth:1120,margin:'0 auto',padding:'0 clamp(20px,5vw,64px)'}},this.buildKPIs())
      ),

      e('div',{style:{maxWidth:1120,margin:'0 auto',padding:'clamp(48px,6vw,80px) clamp(20px,5vw,64px)'}},

        /* 01 – Team allocation */
        e('section',{style:{marginBottom:'clamp(52px,7vw,88px)'}},
          e('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:18,marginBottom:20,flexWrap:'wrap'}},
            e('div',{style:{display:'flex',alignItems:'flex-start',gap:18}},
              e('div',{style:{fontSize:11,color:'#bbc4cf',letterSpacing:'0.12em',fontWeight:600,paddingTop:4,minWidth:24}},'01'),
              e('div',null,
                e('h2',{style:{fontSize:'clamp(18px,2.8vw,28px)',fontWeight:400,color:'#1b2d44',letterSpacing:'-0.015em',margin:'0 0 6px'}},'Team allocation'),
                e('p',{style:{fontSize:14,color:'#6b7d94',lineHeight:1.6,margin:0,maxWidth:440}},'Planned vs. actual hours per person — Jun 8–12, the last complete week.')
              )
            ),
            e('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',paddingTop:4}},
              e('span',{style:{fontSize:11,color:this.GRAY,fontWeight:600,letterSpacing:'0.07em',textTransform:'uppercase'}},'Filter'),
              this.buildOwnerPills(true)
            )
          ),
          this.buildTeamBars()
        ),

        e('div',{style:{height:1,background:'#e4e9ef',marginBottom:'clamp(52px,7vw,88px)'}}),

        /* 02 – Active portfolio */
        e('section',{style:{marginBottom:'clamp(52px,7vw,88px)'}},
          e('div',{style:{display:'flex',alignItems:'flex-start',gap:18,marginBottom:28}},
            e('div',{style:{fontSize:11,color:'#bbc4cf',letterSpacing:'0.12em',fontWeight:600,paddingTop:4,minWidth:24}},'02'),
            e('div',null,
              e('h2',{style:{fontSize:'clamp(18px,2.8vw,28px)',fontWeight:400,color:'#1b2d44',letterSpacing:'-0.015em',margin:'0 0 6px'}},'Active portfolio'),
              e('p',{style:{fontSize:14,color:'#6b7d94',lineHeight:1.6,margin:0,maxWidth:440}},'Every project in flight. Click any row to see the full 8-week trend.')
            )
          ),
          this.buildFilterBar(),
          this.buildTable()
        ),

        e('div',{style:{height:1,background:'#e4e9ef',marginBottom:'clamp(52px,7vw,88px)'}}),

        /* 03 – Planned vs. actual */
        e('section',null,
          e('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:18,marginBottom:28,flexWrap:'wrap'}},
            e('div',{style:{display:'flex',alignItems:'flex-start',gap:18}},
              e('div',{style:{fontSize:11,color:'#bbc4cf',letterSpacing:'0.12em',fontWeight:600,paddingTop:4,minWidth:24}},'03'),
              e('div',null,
                e('h2',{style:{fontSize:'clamp(18px,2.8vw,28px)',fontWeight:400,color:'#1b2d44',letterSpacing:'-0.015em',margin:'0 0 6px'}},'Planned vs. actual'),
                e('p',{style:{fontSize:14,color:'#6b7d94',lineHeight:1.6,margin:0,maxWidth:440}},chartView==='weekly'?'Team-wide delivery by week. Light = planned, filled = delivered.':'Monthly rollup — May actuals and Jun plan vs. actual.')
              )
            ),
            e('div',{style:{display:'flex',borderRadius:8,border:'1px solid #dde4eb',overflow:'hidden',flexShrink:0}},
              ...['weekly','monthly'].map(v=>e('button',{key:v,onClick:()=>this.setState({chartView:v}),style:{
                padding:'6px 16px',border:'none',fontSize:12,fontWeight:500,cursor:'pointer',fontFamily:'inherit',
                background:chartView===v?this.NAVY:'#fff',
                color:chartView===v?'#fff':'#6b7d94',
              }},v==='weekly'?'Weekly':'Monthly'))
            )
          ),
          chartView==='weekly'?this.buildWeekly():this.buildMonthly()
        )
      ),

      e('footer',{style:{background:'#1b2d44',marginTop:'clamp(52px,7vw,88px)',padding:'clamp(18px,3vw,32px) clamp(20px,5vw,64px)'}},
        e('div',{style:{maxWidth:1120,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}},
          e('span',{style:{color:'rgba(255,255,255,0.25)',fontSize:12,fontWeight:300}},'Business Applications Team · Automation Anywhere'),
          e('span',{style:{color:'rgba(255,255,255,0.18)',fontSize:12,fontWeight:300}},'Generated Jun 22, 2026')
        )
      )
    );
  }
}

root.render(React.createElement(BATDashboard));

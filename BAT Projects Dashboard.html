class DCLogic {
  setState(patchOrFn) {
    const patch = typeof patchOrFn === 'function' ? patchOrFn(this.state) : patchOrFn;
    Object.assign(this.state, patch);
    if (this._update) this._update();
  }
  componentDidMount() {}
}

/* ── SharePoint / Power Automate config ─────────────────────────
   Paste your Power Automate HTTP trigger URLs below.
   Leave as-is to run in localStorage-only mode while setting up.
──────────────────────────────────────────────────────────────── */
const SP_READ_URL  = 'YOUR_READ_FLOW_URL';   // Flow 1 — GET trigger URL
const SP_WRITE_URL = 'YOUR_WRITE_FLOW_URL';  // Flow 2 — POST trigger URL
const SP_READY = SP_READ_URL !== 'YOUR_READ_FLOW_URL';

async function spRead() {
  const res = await fetch(SP_READ_URL);
  if (!res.ok) throw new Error('SharePoint read failed: ' + res.status);
  const j = await res.json();
  return JSON.parse(j.data || '{}');
}

async function spWrite(data) {
  // text/plain avoids CORS preflight — Power Automate receives body as string, parse with JSON.parse(triggerBody()) in the flow
  await fetch(SP_WRITE_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data)
  });
}

/* ── Dynamic calendar: weeks (Friday-anchored) and months auto-extend ─────────
   History anchor: May 1, 2026 (a Friday). Generates past weeks + 20 weeks ahead.
   MONTH_OPTS covers 3 years so project phases can span far into the future.
──────────────────────────────────────────────────────────────────────────── */
function _computeCalendar(today){
  const MA=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dow=today.getDay(),dF=(5-dow+7)%7;
  const cf=new Date(today);cf.setDate(today.getDate()+dF);cf.setHours(0,0,0,0);
  const cfMs=cf.getTime();
  const fe=new Date(cf);fe.setDate(cf.getDate()+20*7);
  const allWeeks=[],weeks=[];
  let d=new Date(2026,4,1),seq=0;
  while(d<=fe){
    const mo=d.getMonth(),dy=d.getDate(),yr=d.getFullYear();
    const dMs=d.getTime(),isCur=dMs===cfMs,isFut=dMs>cfMs;
    const w={id:'w_'+MA[mo]+dy,short:MS[mo]+' '+dy,month:mo,year:yr,startMs:dMs,
              actualIdx:seq<8?seq:null,plannedIdx:(seq>=5&&seq<=8)?(seq-5):null,
              forecastIdx:null,isFuture:isFut,current:isCur};
    allWeeks.push(w);if(!isFut)weeks.push(w);
    d=new Date(d);d.setDate(d.getDate()+7);seq++;
  }
  const months=[];let my=2026,mm=4;
  const cap=today.getFullYear()*12+today.getMonth()+5;
  while(my*12+mm<=cap){
    months.push({id:MA[mm]+(my>2026?String(my).slice(2):''),
      label:MS[mm]+(my>2026?' '+String(my).slice(2):''),
      month:mm,year:my,monthOffset:(my-2026)*12+mm,
      isFuture:my>today.getFullYear()||(my===today.getFullYear()&&mm>today.getMonth()),
      current:my===today.getFullYear()&&mm===today.getMonth()});
    mm++;if(mm>11){mm=0;my++;}
  }
  const curW=weeks.find(w=>w.current)||weeks[weeks.length-1];
  return{allWeeks,weeks,months,currentWeekId:curW?curW.id:'w_jun26'};
}

  /* ── Lifecycle ─────────────────────────────────── */
  async componentDidMount(){
    try{
      const d = SP_READY ? await spRead() : JSON.parse(localStorage.getItem('bat_v1')||'{}');
      this._applyData(d);
    }catch(e){
      // SharePoint failed — fall back to localStorage
      try{this._applyData(JSON.parse(localStorage.getItem('bat_v1')||'{}'));}catch(e2){}
    }
    if(SP_READY){
      // Poll every 30s so all team members stay in sync
      this._pollId=setInterval(async()=>{
        try{const d=await spRead();this._applyData(d);}catch(e){}
      },30000);
    }
  }
  _applyData(d){
    const p={};
    if(d.weeklyLog){
      const nameToOwner={};this.DEFAULT_PROJECTS.forEach(pr=>{nameToOwner[pr.name]=this.getOwners(pr)[0];});
      const mig={};
      Object.entries(d.weeklyLog).forEach(([n,v])=>{
        if(!v||typeof v!=='object')return;
        const fk=Object.keys(v)[0];
        const v2=(fk&&!fk.startsWith('w_'))?{'w_jun26':v}:v;
        const newKey=n.includes('|')?n:(nameToOwner[n]?n+'|'+nameToOwner[n]:n);
        mig[newKey]=v2;
      });
      p.weeklyLog=mig;
    }
    if(d.members)p.members=d.members;
    if(d.projects){
      // Deduplicate: merge same-named entries (from old per-owner structure) into one with combined owners
      const seen={},merged=[];
      d.projects.forEach(pr=>{
        const owners=pr.owners||[pr.owner].filter(Boolean);
        if(seen[pr.name]!==undefined){
          const ex=merged[seen[pr.name]];
          merged[seen[pr.name]]={...ex,owners:[...new Set([...(ex.owners||[]),...owners])]};
        } else {
          seen[pr.name]=merged.length;
          merged.push({...pr,owners,statusLog:pr.statusLog||[]});
        }
      });
      p.projects=merged;
    }
    if(d.ptoLog)p.ptoLog=d.ptoLog;
    if(d.projectComments)p.projectComments=d.projectComments;
    if(Object.keys(p).length)this.setState(p);
  }
  persist(patch){
    const n={...this.state,...patch};
    const data={weeklyLog:n.weeklyLog,members:n.members,projects:n.projects,ptoLog:n.ptoLog,projectComments:n.projectComments};
    // Always write localStorage as offline fallback
    try{localStorage.setItem('bat_v1',JSON.stringify(data));}catch(e){}
    // Write to SharePoint if configured
    if(SP_READY)spWrite(data).catch(e=>console.warn('SharePoint save failed:',e));
    this.setState(patch);
  }

  /* ── Data helpers ──────────────────────────────── */
  getMembers(){return this.state.members||this.DEFAULT_MEMBERS;}
  getOwners(p){return p.owners||[p.owner];}
  wlogKey(p,member){
    const owners=this.getOwners(p);
    if(owners.length>1&&member)return p.name+'|'+member;
    return p.name+'|'+owners[0];
  }
  getProjects(){
    const base=this.state.projects||this.DEFAULT_PROJECTS;
    return base.map(p=>{
      const owners=this.getOwners(p);
      if(owners.length>1)return p; // multi-owner: no single weeklyLog to apply
      const log=this.state.weeklyLog[this.wlogKey(p)];if(!log)return p;
      const a8=[...p.actual8w],p4=[...p.planned4w];
      this.WEEKS.forEach(w=>{const ov=log[w.id];if(!ov)return;if(w.actualIdx!==null&&ov.actual!=null)a8[w.actualIdx]=ov.actual;if(w.plannedIdx!==null&&ov.planned!=null)p4[w.plannedIdx]=ov.planned;});
      return{...p,actual8w:a8,planned4w:p4};
    });
  }
  filtered(){
    let ps=this.getProjects().filter(p=>!['Completed','Archived'].includes(p.status));
    if(this.state.filterType!=='All')ps=ps.filter(p=>p.type===this.state.filterType);
    if(this.state.filterOwner!=='All')ps=ps.filter(p=>this.getOwners(p).includes(this.state.filterOwner));
    return ps;
  }
  loadWeekEntries(weekId,member){
    const wk=this.ALL_WEEKS.find(w=>w.id===weekId)||this.WEEKS.find(w=>w.id===weekId);
    const entries={};
    this.getProjects().filter(p=>this.getOwners(p).includes(member)&&!['Completed','Archived'].includes(p.status)).forEach(p=>{
      const ov=this.state.weeklyLog[this.wlogKey(p,member)]?.[weekId];
      const dA=wk?.actualIdx!=null?p.actual8w[wk.actualIdx]:'';
      const dP=wk?.plannedIdx!=null?p.planned4w[wk.plannedIdx]:(wk?.isFuture?this.getPhaseHPW(p,wk.startMs):'');
      entries[p.name]={planned:ov?.planned!=null?ov.planned:dP,actual:ov?.actual!=null?ov.actual:(dA||'')};
    });
    return entries;
  }
  estTotal(phases){return phases.reduce((s,ph)=>s+ph.hpw*(ph.endMonth-ph.startMonth+1)*4.33,0);}
  actTotal(p){
    const base=p.actual8w.reduce((s,v)=>s+v,0);
    const owners=this.getOwners(p);
    if(owners.length>1){
      return base*owners.length;
    }
    return base+Object.values(this.state.weeklyLog[this.wlogKey(p)]||{}).reduce((s,w)=>s+(w?.actual||0),0);
  }
  getOwnerWeekData(owner,weekId){
    const allW=this.ALL_WEEKS;
    const w=allW.find(x=>x.id===weekId)||this.WEEKS.find(x=>x.id===weekId);
    if(!w)return{actual:0,planned:0};
    const ps=this.getProjects().filter(p=>this.getOwners(p).includes(owner)&&!['Completed','Archived'].includes(p.status));
    let actual=0,planned=0;
    ps.forEach(p=>{
      const owners=this.getOwners(p);
      const logKey=owners.length>1?p.name+'|'+owner:this.wlogKey(p);
      if(w.current){
        actual+=this.state.weeklyLog[logKey]?.[w.id]?.actual||(owners.length>1?p.actual8w[0]||0:0);
        planned+=w.plannedIdx!==null?(p.planned4w[w.plannedIdx]||0):0;
      } else if(w.isFuture){
        actual+=this.state.weeklyLog[logKey]?.[w.id]?.actual||0;
        planned+=this.state.weeklyLog[logKey]?.[w.id]?.planned||this.getPhaseHPW(p,w.startMs);
      } else {
        if(w.actualIdx!==null)actual+=(this.state.weeklyLog[logKey]?.[w.id]?.actual??p.actual8w[w.actualIdx])||0;
        if(w.plannedIdx!==null)planned+=(this.state.weeklyLog[logKey]?.[w.id]?.planned??p.planned4w[w.plannedIdx])||0;
      }
    });
    return{actual,planned};
  }
  getMemberPTO(m,wid){return this.state.ptoLog[m]?.[wid]||0;}

  // Returns forecast h/week for a project at a given week's date, derived from phases.
  // Falls back to legacy forecast[] array if no phase covers that period.
  getPhaseHPW(p,weekMs){
    if(!weekMs)return 0;
    const d=new Date(weekMs);
    const mo=(d.getFullYear()-2026)*12+d.getMonth(); // months since Jan 2026
    const phase=(p.phases||[]).find(ph=>mo>=ph.startMonth&&mo<=ph.endMonth);
    if(phase)return phase.hpw||0;
    // Legacy fallback
    if(p.forecast){
      if(mo===6)return p.forecast[0]||0;
      if(mo>=7)return p.forecast[Math.min(mo-6,p.forecast.length-1)]||0;
    }
    return 0;
  }
  getBlockers(pname){return(this.state.projectComments[pname]||[]).filter(c=>c.isBlocker&&!c.resolved);}
  e(t,p,...c){return React.createElement(t,p,...c);}
  vc(v){if(!v&&v!==0)return this.GRAY;return v>=0?this.GREEN:Math.abs(v)<=2?this.AMBER:this.RED;}

  /* ── Comment actions ───────────────────────────── */
  addComment(pname){
    const{commentForm,projectComments}=this.state;
    if(!commentForm.text.trim())return;
    const c={id:Date.now(),author:commentForm.author,text:commentForm.text.trim(),ts:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),isBlocker:commentForm.isBlocker,resolved:false};

          planned=log?.[selW.id]?.planned??(selW.plannedIdx!=null?p.planned4w[selW.plannedIdx]??0:0);
        } else {
          actual=selW.actualIdx!==null?(log?.[selW.id]?.actual??p.actual8w[selW.actualIdx]??0):0;
          planned=selW.plannedIdx!==null?(log?.[selW.id]?.planned??p.planned4w[selW.plannedIdx]??0):0;
        }
        const pct=planned>0?Math.round(actual/planned*100):null;
        const bc=pct===null?this.GRAY:pct>=90?this.GREEN:pct>=70?this.BLUE:pct>=50?this.AMBER:this.RED;
        const color=avatarColors[i%avatarColors.length];
        return e('div',{key:m,style:{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:'#fff',borderRadius:8,border:'1px solid #e4e9ef',flex:'1 1 130px',minWidth:120}},
          e('div',{style:{width:28,height:28,borderRadius:'50%',background:color+'15',border:'1.5px solid '+color+'44',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
            e('span',{style:{fontSize:11,fontWeight:700,color:color}},m[0])
          ),
          e('div',{style:{minWidth:0}},
            e('div',{style:{fontSize:12,fontWeight:600,color:this.NAVY,lineHeight:1}},m),
            e('div',{style:{display:'flex',alignItems:'baseline',gap:4,marginTop:3}},
              e('span',{style:{fontSize:14,fontWeight:700,color:bc,fontVariantNumeric:'tabular-nums'}},actual+'h'),
              planned>0&&e('span',{style:{fontSize:10,color:this.GRAY}},'/'+planned+'h'),
              pct!==null&&e('span',{style:{fontSize:10,fontWeight:500,color:bc,background:bc+'12',padding:'0 4px',borderRadius:3}},pct+'%')
            )
          )
        );
      });
      teamPanel=e('div',{style:{padding:'14px 20px 10px',borderBottom:'1px solid #f0f4f8'}},
        e('div',{style:{fontSize:9,color:this.GRAY,textTransform:'uppercase',letterSpacing:'0.07em',fontWeight:600,marginBottom:8}},'Team contributions · '+selW.short),
        e('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},...contribs)
      );
    }

    // Last 8 weeks of history + 4 upcoming weeks of forecast
    const histW=this.WEEKS.slice(-8);
    const futW=this.ALL_WEEKS.filter(w=>w.isFuture).slice(0,4);
    const trendWs=[...histW,...futW];
    const pts=trendWs.map(w=>{
      if(w.isFuture){
        const fc=this.getPhaseHPW(p,w.startMs);
        const logged=this.state.weeklyLog[this.wlogKey(p)]?.[w.id];
        return{label:w.short,planned:logged?.planned??fc,actual:logged?.actual??null,fc:!logged};
      }
      let actual=null,planned=null;
      if(w.actualIdx!=null){actual=p.actual8w[w.actualIdx];}
      if(w.current){const lg=this.state.weeklyLog[this.wlogKey(p)]?.[w.id];if(lg?.actual!=null)actual=lg.actual;planned=lg?.planned??(w.plannedIdx!=null?p.planned4w[w.plannedIdx]:null);}
      else if(w.plannedIdx!=null){planned=p.planned4w[w.plannedIdx];}
      return{label:w.short,actual,planned,fc:false};
    });
    const mx=Math.max(1,...pts.map(d=>Math.max(d.planned||0,d.actual||0)));
    const CH=68,N=pts.length,BW=22;

    // Phase Gantt — auto-scaled to the project's actual date span
    let phGantt=null;
    if(p.phases&&p.phases.length>0){
      const allMo=p.phases.flatMap(ph=>[ph.startMonth,ph.endMonth]);
      const minMo=Math.min(...allMo),maxMo=Math.max(...allMo);
      const span=Math.max(maxMo-minMo+1,1);
      const today=new Date();
      const todayMo=(today.getFullYear()-2026)*12+today.getMonth();
      const nowPct=Math.max(0,Math.min((todayMo-minMo)/span*100,100));
      const MINITIALS=['J','F','M','A','M','J','J','A','S','O','N','D'];
      const bars=p.phases.map((ph,i)=>{
        const c=this.PC[ph.name]||this.GRAY;
        const l=((ph.startMonth-minMo)/span*100)+'%';
        const w=((ph.endMonth-ph.startMonth+1)/span*100)+'%';
        return e('div',{key:i,style:{position:'absolute',top:0,height:20,left:l,width:w,background:c,borderRadius:3,display:'flex',alignItems:'center',padding:'0 5px',overflow:'hidden'}},
          e('span',{style:{fontSize:8,color:'#fff',fontWeight:600,whiteSpace:'nowrap'}},ph.name+(ph.hpw>0?' '+ph.hpw+'h/w':''))
        );
      });
      const nowLine=e('div',{style:{position:'absolute',top:-1,left:nowPct+'%',width:2,height:22,background:this.NAVY,opacity:0.5,borderRadius:1}});
      // Month label ticks
      const mLabels=[];
      for(let mo=minMo;mo<=maxMo;mo++){
        const pct=((mo-minMo)/span*100)+'%';
        const yr=2026+Math.floor(mo/12),mm=mo%12;
        const lbl=MINITIALS[mm]+(yr>2026?String(yr).slice(2):'');
        mLabels.push(e('div',{key:mo,style:{position:'absolute',left:pct,fontSize:7,color:mo===todayMo?this.BLUE:'#c4cdd6',transform:'translateX(-50%)'}},lbl));
      }
      const rangeLabel=`${this.MONTH_OPTS[minMo]?.label||''}–${this.MONTH_OPTS[maxMo]?.label||''}`;
      phGantt=e('div',{style:{marginBottom:10}},
        e('div',{style:{fontSize:9,color:this.GRAY,textTransform:'uppercase',letterSpacing:'0.07em',fontWeight:600,marginBottom:4}},'Phase timeline ('+rangeLabel+')'),
        e('div',{style:{position:'relative',height:20}},...bars,nowLine),
        e('div',{style:{position:'relative',height:14,marginTop:2}},...mLabels)
      );
    }

    // Trend SVG bars
    const svgBars=pts.map((d,i)=>{
      const x=i*BW,bw=BW-3;
      const pH=d.planned>0?Math.max(2,(d.planned/mx)*(CH-3)):0;
      const aH=d.actual>0?Math.max(2,(d.actual/mx)*(CH-3)):0;
      const r=d.planned&&d.actual!=null?d.actual/d.planned:null;
      const fill=d.fc?'#c4d8ec':r===null?'#c4d8ec':r>=0.9?this.GREEN:r>=0.65?this.AMBER:this.RED;
      const parts=d.label.replace(' ▶','').split(' ');const wkLabel=parts[1]||parts[0];
      const els=[];
      if(pH>0)els.push(React.createElement('rect',{key:'p'+i,x,y:CH-pH,width:bw,height:pH,fill:d.fc?'#ddeef9':'#dde9f4',rx:1}));
      if(aH>0)els.push(React.createElement('rect',{key:'a'+i,x,y:CH-aH,width:bw,height:aH,fill,rx:1}));
      els.push(React.createElement('text',{key:'l'+i,x:x+bw/2,y:CH+12,textAnchor:'middle',fontSize:6.5,fill:d.fc?'#c4cdd6':this.GRAY,style:{fontFamily:'inherit'}},wkLabel));
      return els;
    }).flat();

    // Stats
    const tot=p.actual8w.reduce((s,v)=>s+v,0);
    const statsData=[['Type',p.type,this.TC[p.type]],['Owner',this.getOwners(p).length>2?this.getOwners(p).slice(0,2).join(', ')+'…':this.getOwners(p).join(', '),null],['Phase',p.currentPhase,this.PC[p.currentPhase]],['8-wk total',tot+'h',null],['Estimated',p.phases?'~'+Math.round(this.estTotal(p.phases))+'h':'—',null],['Forecast W0',p.planned4w[3]>0?p.planned4w[3]+'h':'—',null]];
    const statsGrid=e('div',{style:{flexShrink:0,minWidth:150,display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px 16px',alignContent:'start'}},
      ...statsData.map(([l,v,c])=>e('div',{key:l},
        e('div',{style:{fontSize:9,color:'#bbc4cf',textTransform:'uppercase',letterSpacing:'0.07em',fontWeight:600,marginBottom:2}},l),
        e('div',{style:{fontSize:13,fontWeight:500,color:c||this.NAVY}},v||'—')
      ))
    );

    return e('div',{style:{animation:'slideDown 0.15s ease-out'}},
      teamPanel,
      e('div',{style:{padding:'16px 20px 12px',display:'flex',gap:24,flexWrap:'wrap'}},
        e('div',{style:{flex:'1 1 280px',minWidth:0}},
          phGantt,

          React.createElement('svg',{viewBox:'0 0 '+(N*BW)+' '+(CH+18),style:{width:'100%',height:'auto',display:'block',maxHeight:CH+18}},...svgBars)
        ),
        statsGrid
      ),
      this.buildDeliverables(p),
      this.buildStatusHistory(p),
      this.buildComments(p)
    );
  }

  getProjectWeekData(p,w){
    const owners=this.getOwners(p);
    // Month offset from Jan 2026 — used for phase lookup
    const wMo=(w.year!==undefined?(w.year-2026)*12:0)+w.month;
    if(owners.length>1){
      let actual=0,planned=0;
      owners.forEach(mbr=>{
        const log=this.state.weeklyLog[p.name+'|'+mbr];
        if(w.current){
          actual+=log?.[w.id]?.actual??p.actual8w[0]??0;
          planned+=log?.[w.id]?.planned??(w.plannedIdx!==null?p.planned4w[w.plannedIdx]??0:0);
        } else if(w.isFuture){
          actual+=log?.[w.id]?.actual??0;
          planned+=log?.[w.id]?.planned??this.getPhaseHPW(p,w.startMs);
        } else {
          actual+=(w.actualIdx!==null?(log?.[w.id]?.actual??p.actual8w[w.actualIdx]??0):0);
          planned+=(w.plannedIdx!==null?(log?.[w.id]?.planned??p.planned4w[w.plannedIdx]??0):0);
        }
      });
      const phase=p.phases?p.phases.find(ph=>wMo>=ph.startMonth&&wMo<=ph.endMonth):null;
      return{actual:actual||null,planned:planned||null,phase,isFuture:w.isFuture};
    }
    let actual=null,planned=null;
    if(w.actualIdx!==null&&w.actualIdx!==undefined){const r=p.actual8w[w.actualIdx];actual=r>0?r:null;}
    if(w.current){
      const log=this.state.weeklyLog[this.wlogKey(p)]?.[w.id];
      if(log?.actual!=null)actual=log.actual;
      planned=log?.planned!=null?log.planned:(w.plannedIdx!==null?p.planned4w[w.plannedIdx]:0);
    } else if(w.plannedIdx!==null&&w.plannedIdx!==undefined){
      planned=p.planned4w[w.plannedIdx];
    } else if(w.isFuture){
      const logged=this.state.weeklyLog[this.wlogKey(p)]?.[w.id];
      if(logged?.actual!=null)actual=logged.actual;
      planned=logged?.planned!=null?logged.planned:this.getPhaseHPW(p,w.startMs);
    }
    const phase=p.phases?p.phases.find(ph=>wMo>=ph.startMonth&&wMo<=ph.endMonth):null;
    return{actual,planned,phase,isFuture:w.isFuture};
  }
  // Sum weeklyLog actuals for a given calendar month (for months beyond the initial 8-week block)
  _monthLogActual(key,mo,yr){
    const log=this.state.weeklyLog[key]||{};
    return this.ALL_WEEKS.filter(w=>!w.isFuture&&w.month===mo&&w.year===yr&&w.actualIdx===null)
      .reduce((s,w)=>s+(log[w.id]?.actual||0),0);
  }
  getProjectMonthData(p,m){
    const owners=this.getOwners(p);
    const mo=m.monthOffset!==undefined?m.monthOffset:((m.year||2026)-2026)*12+m.month;
    const phase=p.phases?p.phases.find(ph=>mo>=ph.startMonth&&mo<=ph.endMonth):null;
    const hpwForecast=this.getPhaseHPW(p,new Date((m.year||2026),m.month,15).getTime());
    const WKMO=4.33;
    if(owners.length>1){
      const mult=owners.length;
      let actual=0,planned=0;
      if(mo===4){ // May 2026 — from actual8w[0..4]
        actual=p.actual8w.slice(0,5).reduce((s,v)=>s+v,0)*mult;
      } else if(mo===5){ // Jun 2026 — actual8w[5..7] + w_jun26 logged
        actual=p.actual8w.slice(5).reduce((s,v)=>s+v,0)*mult;
        const w26sum=owners.reduce((s,mbr)=>s+(this.state.weeklyLog[p.name+'|'+mbr]?.['w_jun26']?.actual||0),0);
        actual+=w26sum||0;
        planned=p.planned4w.reduce((s,v)=>s+v,0)*mult;
      } else {
        // Jul 2026+ — sum logged actuals for this month + phase-based planned
        actual=owners.reduce((t,mbr)=>t+this._monthLogActual(p.name+'|'+mbr,m.month,m.year||2026),0);
        planned=hpwForecast*WKMO*mult;
      }
      return{actual,planned,phase,isFuture:m.isFuture};
    }
    let actual=0,planned=0;
    if(mo===4){ // May 2026
      actual=p.actual8w.slice(0,5).reduce((s,v)=>s+v,0);
    } else if(mo===5){ // Jun 2026
      actual=p.actual8w.slice(5).reduce((s,v)=>s+v,0);
      const w0=this.state.weeklyLog[this.wlogKey(p)]?.['w_jun26'];
      if(w0?.actual!=null)actual+=w0.actual;
      planned=p.planned4w.reduce((s,v)=>s+v,0);
    } else {
      // Jul 2026+ — logged actuals for this month + phase-based planned
      actual=this._monthLogActual(this.wlogKey(p),m.month,m.year||2026);
      planned=hpwForecast*WKMO;
    }
    return{actual,planned,phase,isFuture:m.isFuture};
  }

    const hdrCells=WEEKS_FULL.map(w=>e('th',{key:w.id,style:{width:COL,minWidth:COL,padding:'8px 4px',fontSize:10,fontWeight:600,textAlign:'center',whiteSpace:'nowrap',color:w.current?this.BLUE:w.isFuture?'#bbc4cf':'#6b7d94',background:w.current?'#f0f5ff':w.isFuture?'#fafbfc':'#f6f8fb',borderBottom:'2px solid '+(w.current?this.BLUE:'#e4e9ef'),position:'sticky',top:0,zIndex:1}},
      e('div',null,w.short),
      e('div',{style:{fontSize:8,color:w.current?this.BLUE:w.isFuture?'#c4cdd6':'#bbc4cf',marginTop:1,fontWeight:400}},w.isFuture?'forecast':w.current?'now':'actual')
    ));

    const weekTotals=WEEKS_FULL.map(w=>{
      let totAct=0,totPlan=0;

        const vari=hasPlan&&hasAct?Math.round((actual-planned)*10)/10:null;

            hasPlan&&e('div',{style:{fontSize:10,color:w.isFuture?'#9aaabb':'#bbc4cf',fontVariantNumeric:'tabular-nums',lineHeight:1}},(w.isFuture?'~':'')+planned+'h'),

            vari!==null&&Math.abs(vari)>=0.5&&e('div',{style:{fontSize:9,fontWeight:500,color:vari>=0?this.GREEN:this.RED,background:vari>=0?'#e8f5ef':'#fde8ec',borderRadius:3,padding:'0 3px',lineHeight:1.4,fontVariantNumeric:'tabular-nums'}},(vari>0?'+':'')+vari)
          )
        );
      });
      return e('tr',{key:p.name,style:{borderBottom:'1px solid #f0f4f8'},onMouseEnter:ev=>{ev.currentTarget.style.background='#f6f8fb';},onMouseLeave:ev=>{ev.currentTarget.style.background='';}},
        e('td',{style:{padding:'10px 12px',position:'sticky',left:0,background:'#fff',zIndex:1,borderRight:'2px solid #e4e9ef',minWidth:LABEL,maxWidth:LABEL}},
          e('div',{style:{display:'flex',alignItems:'center',gap:7}},
            e('div',{style:{width:3,height:16,borderRadius:2,background:tc,flexShrink:0}}),
            e('div',null,
              e('div',{style:{fontSize:12,fontWeight:500,color:this.NAVY,lineHeight:1.3,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:160}},p.name),
              e('div',{style:{display:'flex',alignItems:'center',gap:4,marginTop:2}},
                e('span',{style:{fontSize:9,color:this.GRAY}},this.getOwners(p).slice(0,2).join(', ')+(this.getOwners(p).length>2?'…':'')),
                p.currentPhase&&e('span',{style:{fontSize:9,color:phc,background:phc+'18',padding:'0 4px',borderRadius:2}},p.currentPhase)
              )
            )
          )
        ),
        ...cells
      );
    });

    const totalsRow=e('tr',{key:'totals',style:{background:'#f6f8fb',borderTop:'2px solid #e4e9ef'}},
      e('td',{style:{padding:'10px 12px',position:'sticky',left:0,background:'#f6f8fb',zIndex:1,borderRight:'2px solid #e4e9ef',fontWeight:600,fontSize:12,color:this.NAVY}},'Team total'),
      ...WEEKS_FULL.map((w,wi)=>{
        const{totAct,totPlan}=weekTotals[wi];
        const ratio=totPlan>0&&totAct>0?totAct/totPlan:null;
        const actColor=ratio===null?(totAct>0?this.BLUE:this.GRAY):ratio>=0.9?this.GREEN:ratio>=0.65?this.AMBER:this.RED;
        return e('td',{key:w.id,style:{padding:'8px 4px',textAlign:'center',background:w.current?'#eaf1ff':w.isFuture?'#f4f5f6':'transparent',borderLeft:'1px solid #e4e9ef'}},
          e('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:2}},
            totPlan>0&&e('div',{style:{fontSize:10,color:'#bbc4cf',fontVariantNumeric:'tabular-nums'}},(w.isFuture?'~':'')+Math.round(totPlan)+'h'),
            totAct>0&&e('div',{style:{fontSize:12,fontWeight:700,color:actColor,fontVariantNumeric:'tabular-nums'}},Math.round(totAct)+'h'),
            !totAct&&!totPlan&&e('div',{style:{fontSize:10,color:'#dde4eb'}},'—')
          )
        );
      })
    );

    return e('div',null,
      e('div',{style:{background:this.NAVY,padding:'28px 32px'}},
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:12}},
          e('div',null,
            e('div',{style:{fontSize:11,color:'#4778a8',letterSpacing:'0.12em',textTransform:'uppercase',fontWeight:600,marginBottom:8}},'Week-by-week'),
            e('h1',{style:{fontSize:'clamp(22px,3vw,36px)',fontWeight:300,color:'#fff',margin:'0 0 6px',letterSpacing:'-0.02em'}},'Actual vs. Forecast'),
            e('p',{style:{fontSize:13,color:'rgba(255,255,255,0.4)',margin:0,fontWeight:300,lineHeight:1.6}},'Every project, every week — past actuals and forward forecast.')
          ),
          e('div',{style:{display:'flex',gap:14,flexWrap:'wrap',alignItems:'center'}},
            ...[[this.GREEN,'≥90%'],[this.AMBER,'65–89%'],[this.RED,'<65%'],['#bbc4cf','Plan/Forecast']].map(([c,l])=>
              e('div',{key:l,style:{display:'flex',alignItems:'center',gap:5}},
                e('div',{style:{width:10,height:10,borderRadius:2,background:c}}),
                e('span',{style:{fontSize:11,color:'rgba(255,255,255,0.45)'}},l)
              )
            )
          )
        )
      ),
      e('div',{style:{background:'#fff',borderBottom:'1px solid #e4e9ef',padding:'10px 32px',display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}},
        e('span',{style:{fontSize:11,color:'#bbc4cf',fontWeight:600,letterSpacing:'0.07em',textTransform:'uppercase'}},'Filter'),
        e('div',{style:{display:'flex',gap:4,flexWrap:'wrap'}},
          ...['All','Transform','Grow','Run','Agent'].map(t=>{const a=filterType===t,c=this.TC[t]||this.NAVY;return e('button',{key:t,onClick:()=>this.setState({filterType:t}),style:{padding:'4px 10px',borderRadius:9999,fontSize:12,fontWeight:500,cursor:'pointer',fontFamily:'inherit',border:'1.5px solid '+(a?c:'#dde4eb'),background:a?c:'#fff',color:a?'#fff':'#6b7d94'}},t);})
        ),
        e('div',{style:{width:1,height:20,background:'#e4e9ef',flexShrink:0}}),
        e('div',{style:{display:'flex',gap:4,flexWrap:'wrap'}},
          ...['All',...this.getMembers()].map(o=>{const a=filterOwner===o;return e('button',{key:o,onClick:()=>this.setState({filterOwner:o}),style:{padding:'4px 10px',borderRadius:9999,fontSize:12,fontWeight:500,cursor:'pointer',fontFamily:'inherit',border:'1.5px solid '+(a?this.BLUE:'#dde4eb'),background:a?this.BLUE:'#fff',color:a?'#fff':'#6b7d94'}},o);})
        ),
        e('span',{style:{marginLeft:'auto',fontSize:11,color:'#bbc4cf'}},'Scroll right for Jul–Aug forecast →')
      ),
      e('div',{style:{overflowX:'auto',overflowY:'auto',maxHeight:'calc(100vh - 200px)'}},
        e('table',{style:{borderCollapse:'collapse',minWidth:(LABEL+WEEKS_FULL.length*COL)+'px',width:'100%'}},
          e('thead',null,e('tr',null,
            e('th',{style:{position:'sticky',left:0,top:0,zIndex:2,background:'#f6f8fb',padding:'10px 12px',width:LABEL,minWidth:LABEL,textAlign:'left',fontSize:10,fontWeight:600,color:this.GRAY,letterSpacing:'0.08em',textTransform:'uppercase',borderBottom:'2px solid #e4e9ef',borderRight:'2px solid #e4e9ef'}},'Project'),

  buildWeeklyView(){
    const{e}=this;
    const weeklyViewWeek=this.state.weeklyViewWeek||_CAL.currentWeekId;
    const wIdx=this.WEEKS.findIndex(w=>w.id===weeklyViewWeek);
    const selW=this.WEEKS[wIdx]||this.WEEKS[this.WEEKS.length-1];
    const prevW=wIdx>0?this.WEEKS[wIdx-1]:null;
    const nextW=wIdx<this.WEEKS.length-1?this.WEEKS[wIdx+1]:null;

    const members=this.getMembers();
    const ps=this.getProjects().filter(p=>!['Completed','Archived'].includes(p.status));

    // Per-project data for selected week
    const projData=ps.map(p=>{
      const d=this.getProjectWeekData(p,selW);
      return{...p,wkActual:d.actual||0,wkPlanned:d.planned||0};
    }).filter(p=>p.wkPlanned>0||p.wkActual>0)
      .sort((a,b)=>(b.wkActual||b.wkPlanned)-(a.wkActual||a.wkPlanned));

    // Per-member summary — always use 40h capacity as planned baseline
    const CAPACITY=40;
    const memData=members.map(m=>{
      const{actual}=this.getOwnerWeekData(m,weeklyViewWeek);
      const pto=this.getMemberPTO(m,weeklyViewWeek);
      const effCap=Math.max(CAPACITY-pto,0);
      const pct=Math.round(actual/CAPACITY*100);
      const bc=pct>=90?this.GREEN:pct>=70?this.BLUE:pct>=50?this.AMBER:actual>0?this.RED:'#c4cdd6';
      const mProjs=projData.filter(p=>this.getOwners(p).includes(m));
      return{m,actual,planned:CAPACITY,pto,effCap,pct,bc,mProjs};
    });

    // Team totals
    const totAct=memData.reduce((s,d)=>s+d.actual,0);
    const totPlan=members.length*CAPACITY;
    const totUtil=Math.round(totAct/totPlan*100);
    const prevTotAct=prevW?members.reduce((s,m)=>s+this.getOwnerWeekData(m,prevW.id).actual,0):null;
    const weekDelta=prevTotAct!==null?Math.round((totAct-prevTotAct)*10)/10:null;
    const behind=memData.filter(d=>d.pct!==null&&d.pct<80).length;

    const kpis=[
      {v:Math.round(totAct*10)/10+'h',l:'Team hours logged',n:selW.short+' total',c:null},
      {v:totUtil+'%',l:'Delivery rate',n:'actual ÷ planned',c:totUtil>=90?this.GREEN:totUtil>=75?this.BLUE:this.AMBER},
      {v:projData.length+'',l:'Projects active',n:'with hours this week',c:null},
      weekDelta!==null
        ?{v:(weekDelta>0?'+':'')+weekDelta+'h',l:'vs last week',n:(prevW?prevW.short:'—')+' → '+selW.short,c:weekDelta>=0?this.GREEN:this.AMBER}
        :{v:behind+'',l:'Below 80% plan',n:'members this week',c:behind===0?this.GREEN:this.AMBER}
    ];

    const MAX_BAR=48;

    // Member cards
    const memberCards=memData.map(d=>
      e('div',{key:d.m,style:{flex:'1 1 180px',minWidth:160,maxWidth:250,background:'#fff',borderRadius:12,border:'1px solid #e4e9ef',padding:'18px'}},
        e('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:14}},
          e('div',{style:{width:34,height:34,borderRadius:'50%',background:this.BLUE+'22',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
            e('span',{style:{fontSize:13,fontWeight:700,color:this.BLUE}},d.m[0])
          ),
          e('div',null,
            e('div',{style:{fontSize:14,fontWeight:600,color:this.NAVY,lineHeight:1}},d.m),
            e('div',{style:{fontSize:11,color:this.GRAY,marginTop:2}},d.mProjs.length+' project'+(d.mProjs.length!==1?'s':''))
          )
        ),
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}},
          e('span',{style:{fontSize:24,fontWeight:700,color:d.bc,fontVariantNumeric:'tabular-nums',lineHeight:1}},d.actual+'h'),
          e('span',{style:{fontSize:13,fontWeight:600,color:d.bc,background:d.bc+'18',padding:'2px 8px',borderRadius:9999}},d.pct+'%')
        ),
        e('div',{style:{fontSize:11,color:this.GRAY,marginBottom:8}},'Capacity: 40h'+(d.pto>0?' · '+d.pto+'h PTO · '+d.effCap+'h available':'')),
        e('div',{style:{position:'relative',height:6,background:'#e4e9ef',borderRadius:3,overflow:'hidden',marginBottom:d.mProjs.length>0?12:0}},
          e('div',{style:{position:'absolute',top:0,left:0,height:'100%',width:(CAPACITY/MAX_BAR*100)+'%',background:'#c4d8ec'}}),
          d.actual>0&&e('div',{style:{position:'absolute',top:0,left:0,height:'100%',width:Math.min(d.actual/MAX_BAR*100,115)+'%',background:d.bc,zIndex:1}})
        ),
        d.mProjs.length>0&&e('div',{style:{borderTop:'1px solid #f0f4f8',paddingTop:10,display:'flex',flexDirection:'column',gap:5}},
          ...d.mProjs.slice(0,4).map(p=>
            e('div',{key:p.name,style:{display:'flex',justifyContent:'space-between',alignItems:'center',gap:4}},
              e('div',{style:{display:'flex',alignItems:'center',gap:5,minWidth:0,overflow:'hidden'}},
                e('div',{style:{width:3,height:10,borderRadius:1,background:this.TC[p.type]||this.BLUE,flexShrink:0}}),
                e('span',{style:{fontSize:11,color:'#3d4f62',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},p.name.length>22?p.name.slice(0,20)+'…':p.name)
              ),
              e('span',{style:{fontSize:11,fontWeight:600,color:this.NAVY,flexShrink:0,fontVariantNumeric:'tabular-nums'}},(p.wkActual>0?p.wkActual:p.wkPlanned)+'h')
            )
          ),
          d.mProjs.length>4&&e('div',{style:{fontSize:10,color:this.GRAY}},'+'+( d.mProjs.length-4)+' more')
        )
      )
    );

    // Project table rows
    const projRows=projData.map(p=>{
      const tc=this.TC[p.type]||this.BLUE;
      const phc=this.PC[p.currentPhase]||this.GRAY;

      return e('tr',{key:p.name,style:{borderBottom:'1px solid #f0f4f8'}},
        e('td',{style:{padding:'10px 12px'}},
          e('div',{style:{display:'flex',alignItems:'center',gap:7}},
            e('div',{style:{width:3,height:15,borderRadius:2,background:tc,flexShrink:0}}),
            e('span',{style:{fontSize:13,fontWeight:500,color:this.NAVY}},p.name)
          )
        ),
        e('td',{style:{padding:'10px 12px',fontSize:12,color:this.GRAY}},this.getOwners(p).length>2?this.getOwners(p).slice(0,2).join(', ')+'…':this.getOwners(p).join(', ')),
        e('td',{style:{padding:'10px 12px'}},p.currentPhase&&e('span',{style:{fontSize:11,fontWeight:500,padding:'2px 7px',borderRadius:4,color:phc,background:phc+'18'}},p.currentPhase)),
        e('td',{style:{padding:'10px 12px',textAlign:'right',fontSize:12,color:this.GRAY,fontVariantNumeric:'tabular-nums'}},p.wkPlanned>0?p.wkPlanned+'h':'—'),
        e('td',{style:{padding:'10px 12px',textAlign:'right',fontSize:13,fontWeight:600,color:p.wkActual>0?this.NAVY:'#bbc4cf',fontVariantNumeric:'tabular-nums'}},p.wkActual>0?p.wkActual+'h':'—'),
        e('td',{style:{padding:'10px 12px',textAlign:'right'}},
          vari!==null?e('span',{style:{fontSize:11,fontWeight:500,color:this.vc(vari)}},(vari>0?'+':'')+vari+'h'):e('span',{style:{color:'#dde4eb',fontSize:11}},'—')
        )
      );
    });

    const totProjPlan=Math.round(projData.reduce((s,p)=>s+p.wkPlanned,0)*10)/10;
    const totProjAct=Math.round(projData.reduce((s,p)=>s+p.wkActual,0)*10)/10;

    return e('div',null,
      e('div',{style:{background:this.NAVY,padding:'28px 32px 32px'}},
        e('div',{style:{maxWidth:1100,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:16}},
          e('div',null,
            e('div',{style:{fontSize:11,color:'#4778a8',letterSpacing:'0.12em',textTransform:'uppercase',fontWeight:600,marginBottom:10}},'Weekly Review'),
            e('h1',{style:{fontSize:'clamp(24px,4vw,40px)',fontWeight:300,color:'#fff',margin:'0 0 6px',letterSpacing:'-0.02em'}},selW.short+' 2026'),
            e('p',{style:{fontSize:14,color:'rgba(255,255,255,0.4)',margin:0,lineHeight:1.6,fontWeight:300}},
              selW.current?'Current week — log hours to update actuals.':
              selW.isFuture?'Future week — no actuals yet.':
              'Historical actuals for week ending '+selW.short+'.'
            )
          ),
          e('div',{style:{display:'flex',alignItems:'center',gap:8}},
            e('button',{onClick:()=>prevW&&this.setState({weeklyViewWeek:prevW.id}),disabled:!prevW,style:{padding:'8px 16px',border:'1.5px solid rgba(255,255,255,0.2)',borderRadius:8,background:'transparent',color:prevW?'rgba(255,255,255,0.85)':'rgba(255,255,255,0.2)',fontSize:13,cursor:prevW?'pointer':'default',fontFamily:'inherit'}},'← '+(prevW?prevW.short:'—')),
            e('button',{onClick:()=>nextW&&this.setState({weeklyViewWeek:nextW.id}),disabled:!nextW,style:{padding:'8px 16px',border:'1.5px solid rgba(255,255,255,0.2)',borderRadius:8,background:'transparent',color:nextW?'rgba(255,255,255,0.85)':'rgba(255,255,255,0.2)',fontSize:13,cursor:nextW?'pointer':'default',fontFamily:'inherit'}},(nextW?nextW.short:'—')+' →')
          )
        )
      ),
      e('div',{style:{background:'#f0f4fa',borderBottom:'1px solid #e4e9ef',overflowX:'auto'}},
        e('div',{style:{maxWidth:1100,margin:'0 auto',padding:'10px 32px',display:'flex',gap:4,alignItems:'center',flexWrap:'nowrap',minWidth:'max-content'}},
          e('span',{style:{fontSize:10,color:'#8899aa',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',marginRight:8,flexShrink:0}},'Week'),
          ...this.WEEKS.map(w=>{
            const sel=weeklyViewWeek===w.id;
            return e('button',{key:w.id,onClick:()=>this.setState({weeklyViewWeek:w.id}),style:{padding:'5px 12px',borderRadius:6,fontSize:12,fontWeight:sel?600:400,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',border:'1.5px solid '+(sel?this.BLUE:'#dde4eb'),background:sel?this.BLUE:w.current?'#e8f0ff':'#fff',color:sel?'#fff':w.current?this.BLUE:'#6b7d94'}},w.short);
          })
        )
      ),
      e('div',{style:{background:'#fff',borderBottom:'1px solid #e4e9ef'}},
        e('div',{style:{maxWidth:1100,margin:'0 auto',padding:'0 32px',display:'flex',flexWrap:'wrap'}},
          ...kpis.map((k,i)=>e('div',{key:k.l,style:{flex:'1 1 140px',padding:'20px 24px',borderRight:i<3?'1px solid #e4e9ef':'none'}},
            e('div',{style:{fontSize:'clamp(28px,3vw,40px)',fontWeight:700,color:k.c||this.NAVY,lineHeight:1,letterSpacing:'-0.03em',fontVariantNumeric:'tabular-nums'}},k.v),
            e('div',{style:{fontSize:13,color:this.NAVY,fontWeight:500,marginTop:6}},k.l),
            e('div',{style:{fontSize:11,color:this.GRAY,marginTop:2,fontWeight:300}},k.n)
          ))
        )
      ),
      e('div',{style:{maxWidth:1100,margin:'0 auto',padding:'36px 32px',display:'flex',flexDirection:'column',gap:32}},
        e('div',null,
          e('div',{style:{display:'flex',alignItems:'flex-start',gap:12,marginBottom:18}},
            e('div',{style:{fontSize:10,color:'#bbc4cf',letterSpacing:'0.12em',fontWeight:600,paddingTop:3,minWidth:22}},'01'),
            e('div',null,
              e('h2',{style:{fontSize:17,fontWeight:500,color:this.NAVY,margin:'0 0 3px',letterSpacing:'-0.01em'}},'Team allocation'),
              e('p',{style:{fontSize:13,color:this.GRAY,margin:0,lineHeight:1.5}},'Planned vs. actual hours per person this week.')
            )
          ),
          e('div',{style:{display:'flex',gap:16,flexWrap:'wrap'}},...memberCards)
        ),
        e('div',{style:{height:1,background:'#e4e9ef'}}),
        e('div',null,
          e('div',{style:{display:'flex',alignItems:'flex-start',gap:12,marginBottom:18}},
            e('div',{style:{fontSize:10,color:'#bbc4cf',letterSpacing:'0.12em',fontWeight:600,paddingTop:3,minWidth:22}},'02'),
            e('div',null,
              e('h2',{style:{fontSize:17,fontWeight:500,color:this.NAVY,margin:'0 0 3px',letterSpacing:'-0.01em'}},'Project breakdown'),
              e('p',{style:{fontSize:13,color:this.GRAY,margin:0,lineHeight:1.5}},'All projects with hours this week, sorted by activity.')
            )
          ),
          projData.length>0
            ?e('div',{style:{background:'#fff',borderRadius:12,border:'1px solid #e4e9ef',overflowX:'auto'}},
                e('table',{style:{width:'100%',minWidth:500,borderCollapse:'collapse'}},
                  e('thead',null,e('tr',{style:{background:'#f6f8fb',borderBottom:'2px solid #e4e9ef'}},
                    ...['Project','Owner','Phase','Planned','Actual','Variance'].map(h=>e('th',{key:h,style:{padding:'9px 12px',fontSize:10,fontWeight:600,color:this.GRAY,letterSpacing:'0.08em',textTransform:'uppercase',whiteSpace:'nowrap',textAlign:['Planned','Actual','Variance'].includes(h)?'right':'left'}},h))
                  )),
                  e('tbody',null,...projRows),
                  e('tfoot',null,e('tr',{style:{background:'#f6f8fb',borderTop:'2px solid #e4e9ef'}},
                    e('td',{colSpan:3,style:{padding:'9px 12px',fontSize:11,fontWeight:600,color:this.NAVY}},'Team total'),
                    e('td',{style:{padding:'9px 12px',textAlign:'right',fontSize:12,fontWeight:700,color:this.GRAY,fontVariantNumeric:'tabular-nums'}},totProjPlan>0?totProjPlan+'h':'—'),
                    e('td',{style:{padding:'9px 12px',textAlign:'right',fontSize:12,fontWeight:700,color:this.NAVY,fontVariantNumeric:'tabular-nums'}},totProjAct>0?totProjAct+'h':'—'),
                    e('td',null)
                  ))
                )
              )
            :e('div',{style:{background:'#fff',borderRadius:12,border:'1px solid #e4e9ef',padding:'32px',textAlign:'center',color:this.GRAY,fontSize:14}},'No hours logged for this week.')
        )
      )
    );
  }

  /* ══ BACKLOG ══════════════════════════════════════ */
  buildBacklogView(){
    const{e}=this,{backlogFilter}=this.state;
    const allPs=this.getProjects().filter(p=>!['Archived'].includes(p.status));

    // Gather all deliverables across all projects
    let allItems=allPs.flatMap(p=>(p.deliverables||[]).map(d=>({...d,projectName:p.name,projectType:p.type})));

    // Apply filters
    if(backlogFilter.status!=='All')allItems=allItems.filter(d=>d.status===backlogFilter.status);
    if(backlogFilter.owner!=='All')allItems=allItems.filter(d=>d.assignee===backlogFilter.owner);
    if(backlogFilter.project!=='All')allItems=allItems.filter(d=>d.projectName===backlogFilter.project);

    // KPI counts
    const total=allItems.length;
    const byStatus=this.D_STATUSES.reduce((a,s)=>({...a,[s]:allItems.filter(d=>d.status===s).length}),{});
    const avatarColors=[this.BLUE,'#7055c0',this.GREEN,this.AMBER,'#c73a3a'];

    const setF=patch=>this.setState({backlogFilter:{...backlogFilter,...patch}});

    // Filter bar
    const filterBar=e('div',{style:{background:'#fff',borderBottom:'1px solid #e4e9ef',padding:'0 32px'}},
      e('div',{style:{maxWidth:1100,margin:'0 auto',display:'flex',gap:0,overflowX:'auto'}},
        // Status tabs
        ...['All',...this.D_STATUSES].map(s=>{
          const count=s==='All'?allPs.reduce((c,p)=>(c+(p.deliverables||[]).length),0):allPs.reduce((c,p)=>(c+(p.deliverables||[]).filter(d=>d.status===s).length),0);
          const active=backlogFilter.status===s;
          const sc=s==='All'?this.NAVY:(this.DS[s]||this.GRAY);
          return e('button',{key:s,onClick:()=>setF({status:s}),style:{padding:'12px 16px',border:'none',borderBottom:'2px solid '+(active?sc:'transparent'),background:'transparent',color:active?sc:'#6b7d94',fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',marginBottom:-1}},
            s+' ('+count+')'
          );
        })
      )
    );

    // Owner filter pills
    const ownerFilter=e('div',{style:{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}},
      e('span',{style:{fontSize:10,color:'#bbc4cf',fontWeight:600,letterSpacing:'0.07em',textTransform:'uppercase'}},'Owner'),
      ...['All',...this.getMembers()].map(o=>e('button',{key:o,onClick:()=>setF({owner:o}),style:{padding:'3px 9px',borderRadius:9999,fontSize:11,fontWeight:500,cursor:'pointer',fontFamily:'inherit',border:'1.5px solid '+(backlogFilter.owner===o?this.BLUE:'#dde4eb'),background:backlogFilter.owner===o?this.BLUE:'#fff',color:backlogFilter.owner===o?'#fff':'#6b7d94'}},o))
    );
    const projectFilter=e('div',{style:{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}},
      e('span',{style:{fontSize:10,color:'#bbc4cf',fontWeight:600,letterSpacing:'0.07em',textTransform:'uppercase'}},'Project'),
      e('select',{value:backlogFilter.project,onChange:ev=>setF({project:ev.target.value}),style:{padding:'4px 8px',border:'1px solid #dde4eb',borderRadius:6,fontSize:12,fontFamily:'inherit',color:this.NAVY,background:'#fff'}},
        e('option',{value:'All'},'All projects'),
        ...allPs.map(p=>e('option',{key:p.name,value:p.name},p.name.length>32?p.name.slice(0,30)+'…':p.name))
      )
    );

    // Table rows
    const rows=allItems.length>0
      ?allItems.map(d=>{
          const sc=this.DS[d.status]||this.GRAY;
          const pc=this.DP[d.priority]||this.GRAY;
          const tc=this.TC[d.projectType]||this.BLUE;
          const mIdx=this.getMembers().indexOf(d.assignee);
          const ac=avatarColors[Math.max(mIdx,0)%avatarColors.length];
          return e('tr',{key:d.id,style:{borderBottom:'1px solid #f0f4f8'},
            onMouseEnter:ev=>{ev.currentTarget.style.background='#f6f8fb';},
            onMouseLeave:ev=>{ev.currentTarget.style.background='';}},
            // Priority
            e('td',{style:{padding:'11px 12px',width:8}},
              e('div',{title:d.priority,style:{width:7,height:7,borderRadius:'50%',background:pc}})
            ),
            // Title
            e('td',{style:{padding:'11px 12px'}},
              e('div',{style:{fontSize:13,fontWeight:500,color:d.status==='Done'?'#9aaabb':this.NAVY,textDecoration:d.status==='Done'?'line-through':'none'}},d.title)
            ),
            // Project
            e('td',{style:{padding:'11px 12px'}},
              e('div',{style:{display:'flex',alignItems:'center',gap:5}},
                e('div',{style:{width:3,height:12,borderRadius:1,background:tc,flexShrink:0}}),
                e('span',{style:{fontSize:12,color:this.GRAY}},d.projectName.length>28?d.projectName.slice(0,26)+'…':d.projectName)
              )
            ),
            // Assignee
            e('td',{style:{padding:'11px 12px'}},
              e('div',{style:{display:'flex',alignItems:'center',gap:6}},
                e('div',{style:{width:22,height:22,borderRadius:'50%',background:ac+'22',border:'1.5px solid '+ac+'44',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
                  e('span',{style:{fontSize:9,fontWeight:700,color:ac}},d.assignee[0])
                ),
                e('span',{style:{fontSize:12,color:this.NAVY}},d.assignee)
              )
            ),
            // Status (click to cycle)
            e('td',{style:{padding:'11px 12px'}},
              e('button',{
                onClick:ev=>{ev.stopPropagation();const i=this.D_STATUSES.indexOf(d.status);this.updateDeliverable(d.projectName,d.id,{status:this.D_STATUSES[(i+1)%this.D_STATUSES.length]});},
                style:{padding:'3px 10px',border:'1px solid '+sc+'44',borderRadius:9999,background:sc+'15',color:sc,fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}
              },d.status)
            ),
            // Delete
            e('td',{style:{padding:'11px 12px',textAlign:'right'}},
              e('button',{onClick:()=>this.deleteDeliverable(d.projectName,d.id),style:{padding:'3px 8px',border:'1px solid #e4e9ef',borderRadius:5,background:'#fff',color:'#bbc4cf',fontSize:11,cursor:'pointer',fontFamily:'inherit'}},'Remove')
            )
          );
        })
      :[e('tr',{key:'empty'},e('td',{colSpan:6,style:{padding:'48px',textAlign:'center',color:this.GRAY,fontSize:14}},'No deliverables yet. Add them by clicking any project row in the Dashboard.'))];

    // Summary KPI strip
    const kpiStrip=e('div',{style:{display:'flex',flexWrap:'wrap',gap:0,borderBottom:'1px solid #e4e9ef',background:'#fff'}},
      e('div',{style:{flex:'1 1 100px',padding:'16px 24px',borderRight:'1px solid #e4e9ef'}},
        e('div',{style:{fontSize:28,fontWeight:700,color:this.NAVY,lineHeight:1,fontVariantNumeric:'tabular-nums'}},total),
        e('div',{style:{fontSize:12,color:this.GRAY,marginTop:4}},'Total deliverables')
      ),
      ...this.D_STATUSES.map((s,i)=>{
        const sc=this.DS[s]||this.GRAY;
        const cnt=allPs.reduce((c,p)=>(c+(p.deliverables||[]).filter(d=>d.status===s).length),0);
        return e('div',{key:s,style:{flex:'1 1 100px',padding:'16px 24px',borderRight:i<3?'1px solid #e4e9ef':'none'}},
          e('div',{style:{fontSize:28,fontWeight:700,color:sc,lineHeight:1,fontVariantNumeric:'tabular-nums'}},cnt),
          e('div',{style:{fontSize:12,color:this.GRAY,marginTop:4}},s)
        );
      })
    );

    return e('div',null,
      e('div',{style:{background:this.NAVY,padding:'28px 32px'}},
        e('div',{style:{maxWidth:1100,margin:'0 auto'}},
          e('div',{style:{fontSize:11,color:'#4778a8',letterSpacing:'0.12em',textTransform:'uppercase',fontWeight:600,marginBottom:10}},'Deliverables'),
          e('h1',{style:{fontSize:'clamp(22px,3vw,36px)',fontWeight:300,color:'#fff',margin:'0 0 6px',letterSpacing:'-0.02em'}},'Backlog'),
          e('p',{style:{fontSize:14,color:'rgba(255,255,255,0.4)',margin:0,lineHeight:1.6,fontWeight:300}},'All user stories and deliverables across every project. Click a status pill to advance it.')
        )
      ),
      e('div',{style:{maxWidth:1100,margin:'0 auto',padding:'0 32px'}},kpiStrip),
      filterBar,
      e('div',{style:{maxWidth:1100,margin:'0 auto',padding:'16px 32px 0'}},
        e('div',{style:{display:'flex',gap:20,flexWrap:'wrap',marginBottom:16}},ownerFilter,projectFilter)
      ),
      e('div',{style:{maxWidth:1100,margin:'0 auto',padding:'0 32px 32px'}},
        e('div',{style:{background:'#fff',borderRadius:12,border:'1px solid #e4e9ef',overflow:'auto'}},
          e('table',{style:{width:'100%',minWidth:600,borderCollapse:'collapse'}},
            e('thead',null,e('tr',{style:{background:'#f6f8fb',borderBottom:'2px solid #e4e9ef'}},
              ...['','Title','Project','Assignee','Status',''].map(h=>e('th',{key:h,style:{padding:'9px 12px',fontSize:10,fontWeight:600,color:this.GRAY,letterSpacing:'0.08em',textTransform:'uppercase',whiteSpace:'nowrap'}},h))
            )),
            e('tbody',null,...rows)
          )
        )
      )
    );
  }

  renderVals(){
    const{view}=this.state;
    return{
      nav:this.buildNav(),
      mainContent:view==='dashboard'?this.buildDashboard():view==='projects'?this.buildProjectsView():view==='backlog'?this.buildBacklogView():view==='log'?this.buildLogView():view==='timeline'?this.buildTimelineView():view==='weekly'?this.buildWeeklyView():this.buildTeamView(),
      projectModal:this.buildProjectModal(),
    };
  }
}

class Wrapper extends React.Component {
  constructor(props) {
    super(props);
    this.inst = new Component();
    this.inst._update = () => this.forceUpdate();
  }
  componentDidMount() {
    if (this.inst.componentDidMount) this.inst.componentDidMount();
  }
  render() {
    try {
      const v = this.inst.renderVals();
      const e = React.createElement;
      return e('div', {
        style: {
          display:'flex', height:'100vh', overflow:'hidden',
          fontFamily:"'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif",
          color:'#1b2d44'
        }
      },
        v.nav,
        e('div', {style:{flex:1,overflowY:'auto',background:'#f6f8fb',minWidth:0}}, v.mainContent),
        v.projectModal
      );
    } catch(err) {
      return React.createElement('pre', {style:{padding:24,color:'red',whiteSpace:'pre-wrap'}}, String(err)+'\n'+err.stack);
    }
  }
}

ReactDOM.render(React.createElement(Wrapper), document.getElementById('root'));
</script>
</body>
</html>
